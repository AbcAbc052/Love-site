<!DOCTYPE html>
<html>
<head>
    <title>Simple Test</title>
</head>
<body>
    <div id="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:black; color:white; display:flex; justify-content:center; align-items:center;">
        <div style="background:white; color:black; padding:30px; border-radius:10px;">
            <h2>Enter Password (04032004)</h2>
            <input type="text" id="pw" style="padding:10px; width:200px;" placeholder="MMDD">
            <button onclick="check()">Submit</button>
            <p id="msg" style="color:red;"></p>
        </div>
    </div>

    <div id="content" style="display:none; text-align:center; margin-top:100px;">
        <h1 style="color:green;">✅ SUCCESS! Website will appear here.</h1>
    </div>

    <script>
        function check() {
            let pwd = document.getElementById('pw').value;
            alert('You typed: "' + pwd + '"');
            if (pwd === '04032004') {
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('content').style.display = 'block';
            } else {
                document.getElementById('msg').innerText = 'Wrong password!';
            }
        }
    </script>
</body>
</html>
